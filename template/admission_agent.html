<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: #f5f7fa; }
        .chat-box {
            background: white;
            height: 70vh;
            overflow-y: auto;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 70%;
        }
        .user-msg {
            background: #d1e7dd;
            margin-left: auto;
        }
        .bot-msg {
            background: #e2e3e5;
            margin-right: auto;
        }

        .typing {
            display: flex;
            gap: 5px;
            align-items: center;
            font-size: 14px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.4s infinite both;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body>

<div class="container py-4">
    <!-- <a href="/" class="btn btn-secondary mb-3">⬅ Back</a> -->

    <h2 class="text-center mb-4">Enquiry Chatbot</h2>

    <div class="chat-box mb-3" id="chatBox">
    </div>

    <div class="input-group">
        <input type="text" id="userInput" class="form-control" placeholder="Ask something...">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>




<script>
function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    const chatBox = document.getElementById("chatBox");

    // Show user message
    const userMsgDiv = document.createElement("div");
    userMsgDiv.className = "message user-msg";
    userMsgDiv.innerText = message;
    chatBox.appendChild(userMsgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = "";

    // Typing indicator
    const typingDiv = document.createElement("div");
    typingDiv.className = "message bot-msg";
    typingDiv.id = "typingIndicator";
    typingDiv.innerHTML = `
        <div class="typing">
            <span></span><span></span><span></span>
        </div>`;
    chatBox.appendChild(typingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    // 🔥 SEND DATA TO BACKEND HERE
    fetch("/admission-message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            message: message,
            name: userName,
            mobile: userMobile
        })
    })
    .then(res => res.json())
    .then(data => {
        typingDiv.remove();

        const botMsg = document.createElement("div");
        botMsg.className = "message bot-msg";
        botMsg.innerText = data.reply;
        chatBox.appendChild(botMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(() => {
        typingDiv.remove();

        const errMsg = document.createElement("div");
        errMsg.className = "message bot-msg";
        errMsg.innerText = "⚠️ Server error. Please try again.";
        chatBox.appendChild(errMsg);
    });
}
</script>


<!-- html for form popup -->


<!-- User Details Modal -->
<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Welcome 👋</h5>
      </div>
      <div class="modal-body">
        <p>Please enter your details to continue</p>

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" id="userName" class="form-control" placeholder="Enter your name">
        </div>

        <div class="mb-3">
          <label class="form-label">Mobile Number</label>
          <input type="tel" id="userMobile" class="form-control" placeholder="Enter mobile number">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary w-100" onclick="saveUserDetails()">Start Chat</button>
      </div>
    </div>
  </div>
</div>



<!-- js for popup -->
<script>
let userName = "";
let userMobile = "";

window.onload = function () {
    const modal = new bootstrap.Modal(document.getElementById("userModal"), {
        backdrop: "static",
        keyboard: false
    });
    modal.show();
};

function saveUserDetails() {
    const name = document.getElementById("userName").value.trim();
    const mobile = document.getElementById("userMobile").value.trim();

    if (name === "" || mobile === "") {
        alert("Please enter both name and mobile number");
        return;
    }

    if (!/^[6-9]\d{9}$/.test(mobile)) {
        alert("Please enter a valid Indian mobile number");
        return;
    }

    userName = name;
    userMobile = mobile;

    // Hide modal
    const modalEl = document.getElementById("userModal");
    const modalInstance = bootstrap.Modal.getInstance(modalEl);
    modalInstance.hide();

    // Optional welcome message
    const chatBox = document.getElementById("chatBox");
    const welcomeMsg = document.createElement("div");
    welcomeMsg.className = "message bot-msg";
    welcomeMsg.innerText = `Welcome ${userName}! How can I help you today?`;
    chatBox.appendChild(welcomeMsg);
}
</script>






</body>
</html>
